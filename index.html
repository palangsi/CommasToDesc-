<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commas to Desc</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        label {
            display: block;
            margin-top: 20px;
            color: #555;
            font-weight: bold;
        }
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: monospace;
            font-size: 14px;
            box-sizing: border-box;
            min-height: 120px;
        }
        button {
            background-color: #667eea;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            width: 100%;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #764ba2;
        }
        #output {
            margin-top: 20px;
            padding: 15px;
            background-color: #f5f5f5;
            border-radius: 5px;
            display: none;
        }
        #output.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Commas to Desc</h1>
        <label for="input">Enter comma-separated values:</label>
        <textarea id="input" placeholder="Example: apple, banana, cherry"></textarea>
        <button onclick="convertToDescription()">Convert</button>
        <div id="output"></div>
    </div>

    <script>
        function convertToDescription() {
            const input = document.getElementById('input').value;
            const output = document.getElementById('output');
            
            if (!input.trim()) {
                output.textContent = 'Please enter some comma-separated values.';
                output.classList.add('show');
                return;
            }
            
            const items = input.split(',').map(item => item.trim()).filter(item => item);
            
            if (items.length === 0) {
                output.textContent = 'No valid items found.';
                output.classList.add('show');
                return;
            }
            
            let description = '';
            if (items.length === 1) {
                description = items[0];
            } else if (items.length === 2) {
                description = `${items[0]} and ${items[1]}`;
            } else {
                const lastItem = items.pop();
                description = `${items.join(', ')}, and ${lastItem}`;
            }
            
            output.innerHTML = `<strong>Description:</strong><br>${description}`;
            output.classList.add('show');
        }
        
        document.getElementById('input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                convertToDescription();
            }
        });
    </script>
</body>
</html>
