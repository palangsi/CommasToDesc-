<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comma to Sentence Converter</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; }
        #result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; background: #f9f9f9; }
    </style>
</head>
<body>
    <h1>Word Combiner</h1>
    <p>Enter comma-separated words:</p>
    <textarea id="inputString" placeholder="apple, banana, cherry"></textarea>
    <button onclick="convert()">Create Sentence</button>

    <h3>Result:</h3>
    <div id="result"></div>

    <script>
        function convert() {
            // 1. Get the input value
            const input = document.getElementById('inputString').value;
            
            // 2. Split by comma, trim whitespace from each word, 
            //    filter out empty strings, and join with a single space.
            const sentence = input
                .split(',')
                .map(word => word.trim())
                .filter(word => word.length > 0)
                .join(' ');

            // 3. Display the result
            document.getElementById('result').innerText = sentence;
        }
    </script>
</body>
</html>
